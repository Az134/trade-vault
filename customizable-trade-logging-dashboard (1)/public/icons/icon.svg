<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  
  <!-- Chart bars -->
  <rect x="100" y="280" width="60" height="120" rx="8" fill="url(#chartGrad)" opacity="0.9"/>
  <rect x="180" y="200" width="60" height="200" rx="8" fill="url(#chartGrad)" opacity="0.9"/>
  <rect x="260" y="240" width="60" height="160" rx="8" fill="url(#chartGrad)" opacity="0.9"/>
  <rect x="340" y="160" width="60" height="240" rx="8" fill="url(#chartGrad)" opacity="0.9"/>
  
  <!-- Trend line -->
  <path d="M130 260 L210 180 L290 220 L370 140" 
        stroke="white" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"
        opacity="0.95"/>
  
  <!-- Arrow head -->
  <path d="M355 125 L385 140 L370 155" 
        stroke="white" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"
        opacity="0.95"/>
  
  <!-- TV text -->
  <text x="256" y="470" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="48" 
        font-weight="800" 
        fill="white" 
        text-anchor="middle"
        opacity="0.9">TRADEVAULT</text>
</svg>
